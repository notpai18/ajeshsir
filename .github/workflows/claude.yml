name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # You must configure ANTHROPIC_API_KEY as a repository secret
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
